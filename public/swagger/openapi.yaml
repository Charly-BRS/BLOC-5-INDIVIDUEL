openapi: 3.0.3
info:
  title: API Vide Grenier En Ligne
  description: Documentation de l'API du projet Vide Grenier En Ligne
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Environnement de développement
  - url: http://localhost:8081
    description: Environnement de production

paths:
  /api/articles:
    get:
      summary: Récupérer la liste des annonces
      tags:
        - Articles
      responses:
        '200':
          description: Liste des annonces récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'

  /api/articles/{id}:
    get:
      summary: Récupérer une annonce par son identifiant
      tags:
        - Articles
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'annonce
          schema:
            type: integer
      responses:
        '200':
          description: Annonce trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          description: Annonce non trouvée

components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Vélo d'occasion
        description:
          type: string
          example: Vélo en bon état, peu utilisé
        picture:
          type: string
          example: 12.jpg
        user_id:
          type: integer
          example: 3
        published_date:
          type: string
          format: date
          example: 2026-03-20