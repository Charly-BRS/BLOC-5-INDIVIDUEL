services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videgrenier-web-dev
    ports:
      - "8080:80"
    env_file:
      - .env.dev
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      - db-dev

  db-dev:
    image: mysql:5.7
    container_name: videgrenier-db-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "3307:3306"
    volumes:
      - db_dev_data:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql:ro

volumes:
  db_dev_data:
  vendor_data:
  