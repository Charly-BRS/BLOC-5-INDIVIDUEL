services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videgrenier-web-prod
    ports:
      - "8081:80"
    environment:
      DB_HOST: db-prod
      DB_NAME: videgrenierenligne
      DB_USER: webapplication
      DB_PASSWORD: 653rag9T
    depends_on:
      - db-prod

  db-prod:
    image: mysql:5.7
    container_name: videgrenier-db-prod
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: videgrenierenligne
      MYSQL_USER: webapplication
      MYSQL_PASSWORD: 653rag9T
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_prod_data:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql:ro

volumes:
  db_prod_data: